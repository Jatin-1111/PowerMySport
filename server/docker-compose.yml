services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pms-server
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      PORT: 5000
      # Host already runs Redis on 6379 — reuse it instead of a second container.
      REDIS_URL: redis://host.docker.internal:6379
    ports:
      - "5000:5000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 512m
